<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F3kel666</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
  }

  /* ── STEP 1 ── */
  #step1 {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    position: absolute;
    top: 0; left: 0;
    z-index: 10;
    cursor: pointer;
  }

  #step1.hidden { display: none; }

  #click-text {
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(16px, 2.5vw, 26px);
    color: #00ff41;
    text-shadow: 0 0 8px #00ff41, 0 0 22px #00ff41;
    animation: blink 1s step-start infinite;
    letter-spacing: 0.1em;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* ── STEP 2: LYRICS ── */
  #step2 {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  #step2.active { display: flex; }

  #lyrics-container {
    position: relative;
    width: 100%;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lyric-line {
    position: absolute;
    font-family: Arial, sans-serif;
    font-size: clamp(32px, 6vw, 72px);
    font-weight: 700;
    color: #fff;
    text-shadow:
      0 0 10px rgba(255,255,255,0.9),
      0 0 30px rgba(255,255,255,0.6),
      0 0 60px rgba(255,255,255,0.3);
    opacity: 0;
    pointer-events: none;
    letter-spacing: 0.05em;
    width: 90vw;
    text-align: center;
  }

  .lyric-line.fade-in  { animation: lyricIn  0.5s ease forwards; }
  .lyric-line.fade-out { animation: lyricOut 0.4s ease forwards; }

  .lyric-char {
    display: inline-block;
    animation: charJitter 0.08s infinite alternate;
    animation-delay: var(--delay);
  }

  @keyframes charJitter {
    0%   { transform: rotate(var(--r1)) translate(var(--tx1), var(--ty1)); }
    100% { transform: rotate(var(--r2)) translate(var(--tx2), var(--ty2)); }
  }

  @keyframes lyricIn {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @keyframes lyricOut {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-8px); }
  }

  /* ── FLASH ── */
  #flash {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #fff;
    z-index: 100;
    pointer-events: none;
  }

  /* ── PROFILE CARD ── */
  #card-wrapper {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  #card-wrapper.active { display: flex; }

  #profile-card {
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 48px 52px;
    max-width: 560px;
    width: 90vw;
    text-align: center;
    box-shadow:
      0 0 40px rgba(255,255,255,0.07),
      0 0 100px rgba(255,255,255,0.03),
      inset 0 0 30px rgba(255,255,255,0.02);
    opacity: 0;
    transform: translateY(40px);
    animation: cardIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.05s forwards;
    font-family: Arial, sans-serif;
    font-size: 16px;
    line-height: 2;
    color: #e0e0e0;
    text-shadow: 0 0 8px rgba(255,255,255,0.35);
  }

  #profile-card a {
    color: #fff;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-shadow: 0 0 10px rgba(255,255,255,0.7);
  }

  #profile-card a:hover {
    text-shadow: 0 0 20px #fff;
  }

  @keyframes cardIn {
    0%   { opacity: 0; transform: translateY(40px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- STEP 1 -->
<div id="step1">
  <span id="click-text">click to continue.</span>
</div>

<!-- STEP 2 -->
<div id="step2">
  <div id="lyrics-container"></div>
</div>

<!-- FLASH -->
<div id="flash"></div>

<!-- CARD -->
<div id="card-wrapper">
  <div id="profile-card">
    Hi, I'm F3kel666. Current owner of reversal (<a href="https://reversal.lat" target="_blank">https://reversal.lat</a>)
    and this website.<br>
    Contact me via email <a href="mailto:f.3.k.e.l.6.6.6@gmail.com">f.3.k.e.l.6.6.6@gmail.com</a><br>
    or discord <strong>@c98j</strong>
  </div>
</div>

<!-- AUDIO -->
<audio id="song" src="embers.mp3" preload="auto"></audio>

<script>
// ═══════════════════════════════════════════════
//  ★ LYRICS CONFIG — edit timestamps and text here
//  t = seconds (e.g. 4*60+29 = 4:29)
//  Use backtick strings if your text has quotes: `She said "hi"`
// ═══════════════════════════════════════════════
const LYRICS = [
  { t: 4*60+29, text: 'pouring out her chest, her sweet little flowers lay wilted' },
  { t: 4*60+31, text: 'she feels their pedals sink between her fingers, leaving nothing but dried carbon' },
  { t: 4*60+36, text: 'Grab these lavender thorns and shove them into my wrists. Maybe I'll feel something different, she yells' },
  { t: 4*60+42, text: 'Her liquid runs across her skin, starving for more' },
  { t: 4*60+45, text: 'She continues to slam those twisted stems into her arms' },
  { t: 4*60+49, text: 'Oh god, oh god, oh god, she repeats internally' },
  { t: 4*60+55, text: 'Wondering how long these newfound scars will take to blossom' },
  { t: 4*60+59, text: 'Little does she know, cutting through her own skin will find no flowers' },
  { t: 5*60+3,  text: 'Yet she continues to wail' },
  { t: 5*60+5,  text: 'I LOVE YOU' },
];

const SONG_START  = 4*60 + 25;   // 4:25 — where song starts playing
const SONG_END    = 7*60 + 3;    // 7:03 — where it loops back
const FADE_OUT_AT = 5*60 + 8;    // seconds after which lyrics scene fades out
// ═══════════════════════════════════════════════

const song = document.getElementById('song');
let shownIndex   = -1;
let currentEl    = null;
let fadeTriggered = false;
let sceneDone    = false;

// ── STEP 1 click ──
document.getElementById('step1').addEventListener('click', () => {
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.add('active');
  song.currentTime = SONG_START;
  song.play().catch(() => {});
  requestAnimationFrame(loop);
});

// ── MAIN LOOP ──
function loop() {
  const t = song.currentTime;

  if (t >= SONG_END - 0.05) {
    song.currentTime = SONG_START;
    song.play();
  }

  for (let i = shownIndex + 1; i < LYRICS.length; i++) {
    if (t >= LYRICS[i].t) {
      showLyric(i);
      shownIndex = i;
    }
  }

  if (t >= FADE_OUT_AT && !fadeTriggered) {
    fadeTriggered = true;
    fadeOutScene();
  }

  if (!sceneDone) requestAnimationFrame(loop);
}

// ── SHOW LYRIC ──
function showLyric(i) {
  if (currentEl) {
    const old = currentEl;
    old.classList.remove('fade-in');
    old.classList.add('fade-out');
    setTimeout(() => old.remove(), 450);
  }

  const el = document.createElement('div');
  el.className = 'lyric-line';
  el.innerHTML = wrapChars(LYRICS[i].text);
  document.getElementById('lyrics-container').appendChild(el);
  requestAnimationFrame(() => el.classList.add('fade-in'));

  currentEl = el;
  startJitter(el);
}

function wrapChars(text) {
  return [...text].map((ch, idx) => {
    if (ch === ' ') return '<span style="display:inline-block;width:0.3em"></span>';
    const r1  = (Math.random()*3.5 - 1.75).toFixed(2);
    const r2  = (Math.random()*3.5 - 1.75).toFixed(2);
    const tx1 = (Math.random()*1.2 - 0.6).toFixed(2);
    const ty1 = (Math.random()*1.2 - 0.6).toFixed(2);
    const tx2 = (Math.random()*1.2 - 0.6).toFixed(2);
    const ty2 = (Math.random()*1.2 - 0.6).toFixed(2);
    const d   = (idx * 0.025 + Math.random()*0.05).toFixed(3);
    return `<span class="lyric-char" style="--r1:${r1}deg;--r2:${r2}deg;--tx1:${tx1}px;--ty1:${ty1}px;--tx2:${tx2}px;--ty2:${ty2}px;--delay:${d}s">${ch}</span>`;
  }).join('');
}

function startJitter(el) {
  const id = setInterval(() => {
    if (!el.parentNode) { clearInterval(id); return; }
    el.querySelectorAll('.lyric-char').forEach(s => {
      s.style.setProperty('--r1',  (Math.random()*3.5-1.75).toFixed(2)+'deg');
      s.style.setProperty('--r2',  (Math.random()*3.5-1.75).toFixed(2)+'deg');
      s.style.setProperty('--tx1', (Math.random()*1.2-0.6).toFixed(2)+'px');
      s.style.setProperty('--ty1', (Math.random()*1.2-0.6).toFixed(2)+'px');
      s.style.setProperty('--tx2', (Math.random()*1.2-0.6).toFixed(2)+'px');
      s.style.setProperty('--ty2', (Math.random()*1.2-0.6).toFixed(2)+'px');
    });
  }, 220);
}

// ── FADE OUT → FLASH → CARD ──
function fadeOutScene() {
  const s2 = document.getElementById('step2');
  s2.style.transition = 'opacity 0.2s ease';
  s2.style.opacity = '0';
  setTimeout(() => {
    s2.style.display = 'none';
    doFlash();
  }, 220);
}

function doFlash() {
  const f = document.getElementById('flash');
  f.style.display = 'block';
  f.style.opacity = '1';
  f.style.transition = 'none';
  setTimeout(() => {
    f.style.transition = 'opacity 0.15s ease';
    f.style.opacity = '0';
    setTimeout(() => {
      f.style.display = 'none';
      document.getElementById('card-wrapper').classList.add('active');
      sceneDone = true;
    }, 160);
  }, 110);
}
</script>
</body>
</html>
