<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>discord profile test</title>
<style>
    <style>
    body { font-family: sans-serif; background: #2c2f33; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }

    .profile-card { position: relative; width: 150px; height: 150px; }

    #mi-avatar {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: #23272a;
    }

    .status-dot {
        position: absolute;
        bottom: 5px;
        right: 5px;
        width: 38px;
        height: 38px;
        border: 6px solid #2c2f33; /* El color de tu fondo */
        border-radius: 50%;
        background-color: #747f8d;
        overflow: hidden; /* Importante para la luna */
    }

    /* --- ESTADOS --- */

    /* Conectado */
    .status-dot.online { background-color: #43b581; }

    /* Ausente (Luna) */
    .status-dot.idle {
        background-color: #faa61a;
        position: absolute;
    }
    /* El "hueco" de la luna */
    .status-dot.idle::before {
        content: "";
        position: absolute;
        top: -5px;   /* Ajusta esto para mover el hueco */
        left: -5px;  /* Ajusta esto para mover el hueco */
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background-color: #2c2f33; /* El mismo color del outline/fondo */
    }

    /* No molestar (DND) */
    .status-dot.dnd {
        background-color: #f04747;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .status-dot.dnd::after {
        content: "";
        width: 70%;
        height: 20%;
        background-color: #2c2f33; /* El mismo color del outline/fondo */
        border-radius: 10px;
    }

    /* Offline / Invisible */
    .status-dot.offline {
        background-color: #747f8d;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .status-dot.offline::after {
        content: "";
        width: 45%;
        height: 45%;
        background-color: #2c2f33; /* El mismo color del outline/fondo */
        border-radius: 50%;
    }
</style>

<script>
    const DISCORD_ID = '1487262222005567559'; 

    async function fetchDiscordStatus() {
        try {
            const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
            const { data, success } = await response.json();

            if (!success) return;

            const avatarElement = document.getElementById('mi-avatar');
            const dotElement = document.getElementById('status-dot');

            // Actualizar Avatar
            const avatarHash = data.discord_user.avatar;
            avatarElement.src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${avatarHash}.png?size=256`;

            // Actualizar Estado (esto añade la clase online, idle, dnd u offline)
            dotElement.className = `status-dot ${data.discord_status}`;

        } catch (e) { console.error(e); }
    }

    fetchDiscordStatus();
    setInterval(fetchDiscordStatus, 15000); // Se actualiza cada 15 segundos
</script>
    <div class="profile-card">
        <img id="mi-avatar" src="" alt="Cargando avatar...">
        <div id="status-dot" class="status-dot"></div>
    </div>

    <script>
        // REEMPLAZA ESTO CON TU ID DE DISCORD
        const DISCORD_ID = '1487262222005567559'; 

        async function fetchDiscordStatus() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await response.json();

                const avatarElement = document.getElementById('mi-avatar');
                const dotElement = document.getElementById('status-dot');

                // 1. Mostrar el Avatar
                const avatarHash = data.discord_user.avatar;
                avatarElement.src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${avatarHash}.png?size=256`;

                // 2. Actualizar el color del estado
                const status = data.discord_status; // online, idle, dnd, offline
                dotElement.className = `status-dot ${status}`;

            } catch (error) {
                console.error("Error cargando datos de Discord:", error);
            }
        }

        // Ejecutar al cargar la página
        fetchDiscordStatus();
        // Opcional: Actualizar cada 30 segundos automáticamente
        setInterval(fetchDiscordStatus, 30000);
    </script>
</body>
</html>
