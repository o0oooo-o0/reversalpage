<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>discord profile test</title>
    <style>
        body { font-family: sans-serif; background: #2c2f33; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* Contenedor del Avatar */
        .profile-card { position: relative; width: 150px; height: 150px; }

        #mi-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #23272a; /* Fondo mientras carga */
        }

        /* El circulito de estado */
        .status-dot {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 5px solid #2c2f33; /* Borde para que resalte */
            background-color: gray; /* Color por defecto (offline) */
        }

        /* Colores según el estado de Discord */
        .online { background-color: #43b581; }
        .idle { background-color: #faa61a; }
        .dnd { background-color: #f04747; }
        .offline { background-color: #747f8d; }
    </style>
</head>
<body>

    <div class="profile-card">
        <img id="mi-avatar" src="" alt="Cargando avatar...">
        <div id="status-dot" class="status-dot"></div>
    </div>

    <script>
        // REEMPLAZA ESTO CON TU ID DE DISCORD
        const DISCORD_ID = '1487262222005567559'; 

        async function fetchDiscordStatus() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await response.json();

                const avatarElement = document.getElementById('mi-avatar');
                const dotElement = document.getElementById('status-dot');

                // 1. Mostrar el Avatar
                const avatarHash = data.discord_user.avatar;
                avatarElement.src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${avatarHash}.png?size=256`;

                // 2. Actualizar el color del estado
                const status = data.discord_status; // online, idle, dnd, offline
                dotElement.className = `status-dot ${status}`;

            } catch (error) {
                console.error("Error cargando datos de Discord:", error);
            }
        }

        // Ejecutar al cargar la página
        fetchDiscordStatus();
        // Opcional: Actualizar cada 30 segundos automáticamente
        setInterval(fetchDiscordStatus, 30000);
    </script>
</body>
</html>
