<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F3kel666</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
  }

  #step1 {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  #step1.gone { display: none; }

  #btn {
    background: none;
    border: none;
    outline: none;
    font-family: 'Courier New', Courier, monospace;
    font-size: 22px;
    color: #00ff41;
    text-shadow: 0 0 8px #00ff41, 0 0 22px #00ff41;
    animation: blink 1s step-start infinite;
    letter-spacing: 0.1em;
    cursor: pointer;
    padding: 40px 60px;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  #step2 {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  #step2.active { display: flex; }

  #lyrics-container {
    position: relative;
    width: 100%;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lyric-line {
    position: absolute;
    font-family: Arial, sans-serif;
    font-size: clamp(16px, 3.5vw, 48px);
    font-weight: 700;
    color: #fff;
    text-shadow:
      0 0 10px rgba(255,255,255,0.9),
      0 0 30px rgba(255,255,255,0.6),
      0 0 60px rgba(255,255,255,0.3);
    opacity: 0;
    pointer-events: none;
    letter-spacing: 0.03em;
    width: 88vw;
    text-align: center;
    line-height: 1.4;
  }

  .lyric-line.fade-in  { animation: lyricIn  0.5s ease forwards; }
  .lyric-line.fade-out { animation: lyricOut 0.4s ease forwards; }

  .lyric-char {
    display: inline-block;
    animation: charJitter 0.08s infinite alternate;
    animation-delay: var(--delay);
  }

  @keyframes charJitter {
    0%   { transform: rotate(var(--r1)) translate(var(--tx1), var(--ty1)); }
    100% { transform: rotate(var(--r2)) translate(var(--tx2), var(--ty2)); }
  }

  @keyframes lyricIn {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @keyframes lyricOut {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-8px); }
  }

  #flash {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #fff;
    z-index: 100;
    pointer-events: none;
  }

  #card-wrapper {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  #card-wrapper.active { display: flex; }

  /* Float animation — más visible, multi-axis */
  @keyframes floatCard {
    0%   { transform: translate(0px,   0px)  rotate(0deg);    }
    15%  { transform: translate(4px,  -10px) rotate(0.4deg);  }
    30%  { transform: translate(-5px, -16px) rotate(-0.3deg); }
    45%  { transform: translate(6px,  -8px)  rotate(0.5deg);  }
    60%  { transform: translate(-4px, -14px) rotate(-0.4deg); }
    75%  { transform: translate(5px,  -6px)  rotate(0.3deg);  }
    88%  { transform: translate(-2px, -11px) rotate(-0.2deg); }
    100% { transform: translate(0px,   0px)  rotate(0deg);    }
  }

  #profile-card {
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 48px 52px;
    max-width: 560px;
    width: 90vw;
    text-align: center;
    box-shadow:
      0 0 40px rgba(255,255,255,0.07),
      0 0 100px rgba(255,255,255,0.03),
      inset 0 0 30px rgba(255,255,255,0.02);
    opacity: 0;
    transform: translateY(40px);
    animation:
      cardIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.05s forwards,
      floatCard 5s ease-in-out 1s infinite;
    font-family: Arial, sans-serif;
    font-size: 16px;
    line-height: 2;
    color: #e0e0e0;
    text-shadow: 0 0 8px rgba(255,255,255,0.35);
  }

  #profile-card a {
    color: #fff;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-shadow: 0 0 10px rgba(255,255,255,0.7);
  }

  @keyframes cardIn {
    0%   { opacity: 0; transform: translateY(40px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="step1">
  <button id="btn" onclick="go()">click to continue.</button>
</div>

<div id="step2">
  <div id="lyrics-container"></div>
</div>

<div id="flash"></div>

<div id="card-wrapper">
  <div id="profile-card">
    Hi, I'm F3kel666. Current owner of reversal (<a href="https://reversal.lat" target="_blank">https://reversal.lat</a>)
    and this website.<br>
    Contact me via email <a href="mailto:f.3.k.e.l.6.6.6@gmail.com">f.3.k.e.l.6.6.6@gmail.com</a><br>
    or discord <strong>@c98j</strong>
  </div>
</div>

<audio id="song" src="embers.mp3" preload="auto" crossorigin="anonymous"></audio>

<script>
// ═══════════════════════════════════════
//  LYRICS CONFIG — tiempos adelantados 0.5s
// ═══════════════════════════════════════
const LYRICS = [
  { t: 4*60+28.5, text: 'pouring out her chest, her sweet little flowers lay wilted' },
  { t: 4*60+30.5, text: 'she feels their pedals sink between her fingers, leaving nothing but dried carbon' },
  { t: 4*60+35.5, text: "Grab these lavender thorns and shove them into my wrists. Maybe I'll feel something different, she yells" },
  { t: 4*60+41.5, text: 'Her liquid runs across her skin, starving for more' },
  { t: 4*60+44.5, text: 'She continues to slam those twisted stems into her arms' },
  { t: 4*60+48.5, text: 'Oh god, oh god, oh god, she repeats internally' },
  { t: 4*60+54.5, text: 'Wondering how long these newfound scars will take to blossom' },
  { t: 4*60+58.5, text: 'Little does she know, cutting through her own skin will find no flowers' },
  { t: 5*60+2.5,  text: 'Yet she continues to wail' },
  { t: 5*60+4.5,  text: 'I LOVE YOU' },
];

const SONG_START = 4*60 + 25;
const SONG_END   = 7*60 + 3;

// Después del I LOVE YOU, cuánto esperar antes de activar el detector
// El I LOVE YOU aparece en 5:04.5, lo dejamos 1s visible → detector arranca en 5:05.5
const DETECTION_START_T = 5*60 + 5.5;

// Fallback: si en 1.4s no detecta nada, dispara igual
const FALLBACK_MS = 1400;

// Umbral de volumen (RMS 0..1). Ajusta si la canción es muy suave/fuerte.
// Un pico repentino normalmente supera 0.15–0.25 en partes de build-up.
const VOLUME_THRESHOLD = 0.18;
// ═══════════════════════════════════════

const song = document.getElementById('song');
let started = false;
let shownIndex = -1, currentEl = null, sceneDone = false;

// Audio analysis
let audioCtx = null, analyser = null, dataArray = null;
let detectingPeak = false, peakTriggered = false, fallbackTimer = null;
let baselineRMS = 0, baselineSamples = 0;

function setupAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaElementSource(song);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Float32Array(analyser.fftSize);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  } catch(e) {
    console.warn('Web Audio API not available:', e);
  }
}

function getRMS() {
  if (!analyser) return 0;
  analyser.getFloatTimeDomainData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
  return Math.sqrt(sum / dataArray.length);
}

function go() {
  if (started) return;
  started = true;
  setupAudio();
  document.getElementById('step1').classList.add('gone');
  document.getElementById('step2').classList.add('active');
  try {
    song.currentTime = SONG_START;
    song.play().catch(() => {});
  } catch(e) {}
  requestAnimationFrame(loop);
}

function loop() {
  const t = song.currentTime;

  if (t >= SONG_END - 0.05) {
    song.currentTime = SONG_START;
    song.play().catch(() => {});
  }

  // Mostrar lyrics
  for (let i = shownIndex + 1; i < LYRICS.length; i++) {
    if (t >= LYRICS[i].t) { showLyric(i); shownIndex = i; }
  }

  // Acumular baseline de volumen antes de la zona de detección
  if (t >= SONG_START && t < DETECTION_START_T && analyser && baselineSamples < 300) {
    const rms = getRMS();
    if (rms > 0) {
      baselineRMS = (baselineRMS * baselineSamples + rms) / (baselineSamples + 1);
      baselineSamples++;
    }
  }

  // Activar detector tras el I LOVE YOU
  if (t >= DETECTION_START_T && !detectingPeak && !peakTriggered) {
    detectingPeak = true;

    // Fade out del I LOVE YOU
    if (currentEl) {
      const el = currentEl;
      el.classList.remove('fade-in');
      el.classList.add('fade-out');
      setTimeout(() => el.remove(), 450);
      currentEl = null;
    }

    // Fade de step2 (1s)
    const s2 = document.getElementById('step2');
    s2.style.transition = 'opacity 1s ease';
    s2.style.opacity = '0';
    setTimeout(() => { s2.style.display = 'none'; }, 1000);

    // Fallback: 1.4s después de activar el detector
    fallbackTimer = setTimeout(() => {
      if (!peakTriggered) triggerFlash();
    }, FALLBACK_MS);
  }

  // Detectar pico de volumen en tiempo real
  if (detectingPeak && !peakTriggered && analyser) {
    const rms = getRMS();
    // El umbral dinámico es el mayor entre el VOLUME_THRESHOLD fijo
    // y 2x el baseline (para adaptarse a canciones más suaves/fuertes)
    const dynamicThreshold = Math.max(VOLUME_THRESHOLD, baselineRMS * 2.0);
    if (rms > dynamicThreshold) {
      triggerFlash();
    }
  }

  if (!sceneDone) requestAnimationFrame(loop);
}

function triggerFlash() {
  if (peakTriggered) return;
  peakTriggered = true;
  detectingPeak = false;
  clearTimeout(fallbackTimer);
  doFlash();
}

function showLyric(i) {
  if (currentEl) {
    const old = currentEl;
    old.classList.remove('fade-in');
    old.classList.add('fade-out');
    setTimeout(() => old.remove(), 450);
  }
  const el = document.createElement('div');
  el.className = 'lyric-line';
  el.innerHTML = wrapChars(LYRICS[i].text);
  document.getElementById('lyrics-container').appendChild(el);
  requestAnimationFrame(() => el.classList.add('fade-in'));
  currentEl = el;
  startJitter(el);
}

function wrapChars(text) {
  return [...text].map((ch, idx) => {
    if (ch === ' ') return '<span style="display:inline-block;width:0.25em"></span>';
    const r1=(Math.random()*3-1.5).toFixed(2), r2=(Math.random()*3-1.5).toFixed(2);
    const tx1=(Math.random()*1.2-0.6).toFixed(2), ty1=(Math.random()*1.2-0.6).toFixed(2);
    const tx2=(Math.random()*1.2-0.6).toFixed(2), ty2=(Math.random()*1.2-0.6).toFixed(2);
    const d=(idx*0.02+Math.random()*0.04).toFixed(3);
    return `<span class="lyric-char" style="--r1:${r1}deg;--r2:${r2}deg;--tx1:${tx1}px;--ty1:${ty1}px;--tx2:${tx2}px;--ty2:${ty2}px;--delay:${d}s">${ch}</span>`;
  }).join('');
}

function startJitter(el) {
  const id = setInterval(() => {
    if (!el.parentNode) { clearInterval(id); return; }
    el.querySelectorAll('.lyric-char').forEach(s => {
      s.style.setProperty('--r1',(Math.random()*3-1.5).toFixed(2)+'deg');
      s.style.setProperty('--r2',(Math.random()*3-1.5).toFixed(2)+'deg');
      s.style.setProperty('--tx1',(Math.random()*1.2-0.6).toFixed(2)+'px');
      s.style.setProperty('--ty1',(Math.random()*1.2-0.6).toFixed(2)+'px');
      s.style.setProperty('--tx2',(Math.random()*1.2-0.6).toFixed(2)+'px');
      s.style.setProperty('--ty2',(Math.random()*1.2-0.6).toFixed(2)+'px');
    });
  }, 220);
}

function doFlash() {
  const f = document.getElementById('flash');
  f.style.display = 'block';
  f.style.opacity = '1';
  f.style.transition = 'none';

  // Flash visible brevemente, luego fade de 1s
  setTimeout(() => {
    f.style.transition = 'opacity 1s ease';
    f.style.opacity = '0';
    setTimeout(() => { f.style.display = 'none'; }, 1000);
  }, 80);

  // Card aparece 0.2s después del flash
  setTimeout(() => {
    document.getElementById('card-wrapper').classList.add('active');
    sceneDone = true;
  }, 280);
}
</script>
</body>
</html>
