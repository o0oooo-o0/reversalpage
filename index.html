<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F3kel666</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
  }

  #step1 {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  #step1.gone { display: none; }

  #btn {
    background: none;
    border: none;
    outline: none;
    font-family: 'Courier New', Courier, monospace;
    font-size: 22px;
    color: #00ff41;
    text-shadow: 0 0 8px #00ff41, 0 0 22px #00ff41;
    animation: blink 1s step-start infinite;
    letter-spacing: 0.1em;
    cursor: pointer;
    padding: 40px 60px;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  #step2 {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  #step2.active { display: flex; }

  #lyrics-container {
    position: relative;
    width: 100%;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lyric-line {
    position: absolute;
    font-family: Arial, sans-serif;
    font-size: clamp(16px, 3.5vw, 48px);
    font-weight: 700;
    color: #fff;
    text-shadow:
      0 0 10px rgba(255,255,255,0.9),
      0 0 30px rgba(255,255,255,0.6),
      0 0 60px rgba(255,255,255,0.3);
    opacity: 0;
    pointer-events: none;
    letter-spacing: 0.03em;
    width: 88vw;
    text-align: center;
    line-height: 1.4;
  }

  .lyric-line.fade-in  { animation: lyricIn  0.5s ease forwards; }
  .lyric-line.fade-out { animation: lyricOut 0.4s ease forwards; }

  .lyric-char {
    display: inline-block;
    animation: charJitter 0.08s infinite alternate;
    animation-delay: var(--delay);
  }

  @keyframes charJitter {
    0%   { transform: rotate(var(--r1)) translate(var(--tx1), var(--ty1)); }
    100% { transform: rotate(var(--r2)) translate(var(--tx2), var(--ty2)); }
  }

  @keyframes lyricIn {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @keyframes lyricOut {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-8px); }
  }

  #flash {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #fff;
    z-index: 100;
    pointer-events: none;
  }

  #card-wrapper {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  #card-wrapper.active { display: flex; }

  /* Float animation: suave, multi-axis */
  @keyframes floatCard {
    0%   { transform: translate(0px, 0px) rotate(0deg); }
    20%  { transform: translate(2px, -4px) rotate(0.15deg); }
    40%  { transform: translate(-2px, -7px) rotate(-0.1deg); }
    55%  { transform: translate(3px, -3px) rotate(0.2deg); }
    70%  { transform: translate(-1px, -6px) rotate(-0.15deg); }
    85%  { transform: translate(2px, -2px) rotate(0.1deg); }
    100% { transform: translate(0px, 0px) rotate(0deg); }
  }

  #profile-card {
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 48px 52px;
    max-width: 560px;
    width: 90vw;
    text-align: center;
    box-shadow:
      0 0 40px rgba(255,255,255,0.07),
      0 0 100px rgba(255,255,255,0.03),
      inset 0 0 30px rgba(255,255,255,0.02);
    opacity: 0;
    transform: translateY(40px);
    animation:
      cardIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.05s forwards,
      floatCard 6s ease-in-out 1s infinite;
    font-family: Arial, sans-serif;
    font-size: 16px;
    line-height: 2;
    color: #e0e0e0;
    text-shadow: 0 0 8px rgba(255,255,255,0.35);
  }

  #profile-card a {
    color: #fff;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-shadow: 0 0 10px rgba(255,255,255,0.7);
  }

  @keyframes cardIn {
    0%   { opacity: 0; transform: translateY(40px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="step1">
  <button id="btn" onclick="go()">click to continue</button>
</div>

<div id="step2">
  <div id="lyrics-container"></div>
</div>

<div id="flash"></div>

<div id="card-wrapper">
  <div id="profile-card">
    Hi, I'm F3kel666. Current owner of reversal (<a href="https://reversal.lat" target="_blank">https://reversal.lat</a>)
    and this website.<br>
    Contact me via email <a href="mailto:f.3.k.e.l.6.6.6@gmail.com">f.3.k.e.l.6.6.6@gmail.com</a><br>
    or discord <strong>@c98j</strong>
  </div>
</div>

<audio id="song" src="embers.mp3" preload="auto"></audio>

<script>
// ═══════════════════════════════════════
//  LYRICS CONFIG
//  Todos los tiempos adelantados 0.5s
// ═══════════════════════════════════════
const LYRICS = [
  { t: 4*60+28.5, text: 'pouring out her chest, her sweet little flowers lay wilted' },
  { t: 4*60+30.5, text: 'she feels their pedals sink between her fingers, leaving nothing but dried carbon' },
  { t: 4*60+35.5, text: "Grab these lavender thorns and shove them into my wrists. Maybe I'll feel something different, she yells" },
  { t: 4*60+41.5, text: 'Her liquid runs across her skin, starving for more' },
  { t: 4*60+44.5, text: 'She continues to slam those twisted stems into her arms' },
  { t: 4*60+48.5, text: 'Oh god, oh god, oh god, she repeats internally' },
  { t: 4*60+54.5, text: 'Wondering how long these newfound scars will take to blossom' },
  { t: 4*60+58.5, text: 'Little does she know, cutting through her own skin will find no flowers' },
  { t: 5*60+2.5,  text: 'Yet she continues to wail' },
  { t: 5*60+4.5,  text: 'I LOVE YOU' },
];

// El primer lyric aparece 0.5s después del click (song empieza en SONG_START)
const SONG_START  = 4*60 + 25;
const SONG_END    = 7*60 + 3;

// "I LOVE YOU" desaparece 1s después de aparecer (~5:04.5 + 1s = 5:05.5)
// Flash aparece a la mitad de ese segundo (~5:05s)
// Fade del step2 dura 1s
const LOVE_YOU_DISAPPEAR_AT = 5*60 + 5.5; // 1s después de aparecer
const FLASH_AT              = 5*60 + 5.0; // mitad del segundo
const FADE_OUT_AT           = 5*60 + 5.0; // fade de 1s empieza aquí
// ═══════════════════════════════════════

const song = document.getElementById('song');
let started = false;
let shownIndex = -1, currentEl = null;
let fadeDone = false, flashDone = false, sceneDone = false;

function go() {
  if (started) return;
  started = true;
  document.getElementById('step1').classList.add('gone');
  document.getElementById('step2').classList.add('active');
  try {
    song.currentTime = SONG_START;
    song.play().catch(() => {});
  } catch(e) {}
  requestAnimationFrame(loop);
}

function loop() {
  const t = song.currentTime;

  if (t >= SONG_END - 0.05) {
    song.currentTime = SONG_START;
    song.play().catch(() => {});
  }

  // Mostrar lyrics
  for (let i = shownIndex + 1; i < LYRICS.length; i++) {
    if (t >= LYRICS[i].t) { showLyric(i); shownIndex = i; }
  }

  // "I LOVE YOU" desaparece 1s después, fade out manual
  if (t >= LOVE_YOU_DISAPPEAR_AT && currentEl && !fadeDone) {
    fadeDone = true;
    const el = currentEl;
    el.classList.remove('fade-in');
    el.classList.add('fade-out');
    setTimeout(() => el.remove(), 450);
  }

  // Fade del step2: dura 1s, empieza en FADE_OUT_AT
  const s2 = document.getElementById('step2');
  if (t >= FADE_OUT_AT && !s2._fadingOut) {
    s2._fadingOut = true;
    s2.style.transition = 'opacity 1s ease';
    s2.style.opacity = '0';
    setTimeout(() => { s2.style.display = 'none'; }, 1000);
  }

  // Flash aparece a mitad del segundo (FLASH_AT), tarda 1s en desaparecer
  if (t >= FLASH_AT && !flashDone) {
    flashDone = true;
    doFlash();
  }

  if (!sceneDone) requestAnimationFrame(loop);
}

function showLyric(i) {
  if (currentEl) {
    const old = currentEl;
    old.classList.remove('fade-in');
    old.classList.add('fade-out');
    setTimeout(() => old.remove(), 450);
  }
  const el = document.createElement('div');
  el.className = 'lyric-line';
  el.innerHTML = wrapChars(LYRICS[i].text);
  document.getElementById('lyrics-container').appendChild(el);
  requestAnimationFrame(() => el.classList.add('fade-in'));
  currentEl = el;
  startJitter(el);
}

function wrapChars(text) {
  return [...text].map((ch, idx) => {
    if (ch === ' ') return '<span style="display:inline-block;width:0.25em"></span>';
    const r1=(Math.random()*3-1.5).toFixed(2), r2=(Math.random()*3-1.5).toFixed(2);
    const tx1=(Math.random()*1.2-0.6).toFixed(2), ty1=(Math.random()*1.2-0.6).toFixed(2);
    const tx2=(Math.random()*1.2-0.6).toFixed(2), ty2=(Math.random()*1.2-0.6).toFixed(2);
    const d=(idx*0.02+Math.random()*0.04).toFixed(3);
    return `<span class="lyric-char" style="--r1:${r1}deg;--r2:${r2}deg;--tx1:${tx1}px;--ty1:${ty1}px;--tx2:${tx2}px;--ty2:${ty2}px;--delay:${d}s">${ch}</span>`;
  }).join('');
}

function startJitter(el) {
  const id = setInterval(() => {
    if (!el.parentNode) { clearInterval(id); return; }
    el.querySelectorAll('.lyric-char').forEach(s => {
      s.style.setProperty('--r1',(Math.random()*3-1.5).toFixed(2)+'deg');
      s.style.setProperty('--r2',(Math.random()*3-1.5).toFixed(2)+'deg');
      s.style.setProperty('--tx1',(Math.random()*1.2-0.6).toFixed(2)+'px');
      s.style.setProperty('--ty1',(Math.random()*1.2-0.6).toFixed(2)+'px');
      s.style.setProperty('--tx2',(Math.random()*1.2-0.6).toFixed(2)+'px');
      s.style.setProperty('--ty2',(Math.random()*1.2-0.6).toFixed(2)+'px');
    });
  }, 220);
}

function doFlash() {
  const f = document.getElementById('flash');
  f.style.display = 'block';
  f.style.opacity = '1';
  f.style.transition = 'none';

  // Flash dura visible un momento, luego fade de 1s
  setTimeout(() => {
    f.style.transition = 'opacity 1s ease';
    f.style.opacity = '0';
    setTimeout(() => {
      f.style.display = 'none';
    }, 1000);
  }, 80);

  // Card aparece 0.2s después del flash
  setTimeout(() => {
    document.getElementById('card-wrapper').classList.add('active');
    sceneDone = true;
  }, 280);
}
</script>
</body>
</html>
