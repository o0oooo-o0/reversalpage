<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F3 — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1a1c1f;
      --surface: rgba(30, 32, 37, 0.75);
      --border:  rgba(255,255,255,0.08);
      --text:    #e8eaed;
      --muted:   #8b8fa8;
      --accent:  #5865f2;
      --online:  #3ba55c;
      --idle:    #faa61a;
      --dnd:     #ed4245;
      --offline: #747f8d;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    #bg-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── LAYOUT ── */
    .main {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center;
      /* centro-arriba: empieza a 20% del alto */
      padding-top: 18vh;
      width: 100%; height: 100vh;
    }

    /* ── CARD ── */
    .card {
      display: flex; flex-direction: row;
      align-items: center;
      gap: 1.8rem;
      width: min(480px, 92vw);
      padding: 1.8rem 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
      opacity: 0;
      transform: translateY(-50px) scale(0.97);
      animation: slideIn 0.8s cubic-bezier(0.34,1.4,0.64,1) 1s forwards;
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── AVATAR — círculo perfecto garantizado ── */
    .avatar-wrap {
      /* Contenedor cuadrado rígido */
      position: relative;
      width: 90px;
      height: 90px;
      flex: 0 0 90px;   /* no crece, no encoge */
      align-self: center;
      border-radius: 50%;
      overflow: hidden;  /* recorta la imagen en círculo */
    }

    .avatar-wrap img {
      /* Llena exactamente el contenedor */
      display: block;
      width: 90px;
      height: 90px;
      object-fit: cover;
      object-position: center;
    }

    /* Ring y dot fuera del overflow:hidden para que no se corten */
    .avatar-outer {
      position: relative;
      width: 90px;
      height: 90px;
      flex: 0 0 90px;
      align-self: center;
    }

    .status-ring {
      position: absolute; inset: -4px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      transition: border-color 0.5s, box-shadow 0.5s;
      pointer-events: none;
    }
    .status-ring.online  { border-color: var(--online);  box-shadow: 0 0 14px rgba(59,165,92,0.45); }
    .status-ring.idle    { border-color: var(--idle);    box-shadow: 0 0 14px rgba(250,166,26,0.45); }
    .status-ring.dnd     { border-color: var(--dnd);     box-shadow: 0 0 14px rgba(237,66,69,0.45); }
    .status-ring.offline { border-color: var(--offline); box-shadow: none; }

    .status-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 3.5px solid #1e2025;
      background: var(--offline);
      transition: background 0.5s;
      display: flex; justify-content: center; align-items: center;
    }
    .status-dot.online  { background: var(--online); }
    .status-dot.idle    { background: var(--idle); overflow: hidden; }
    .status-dot.idle::before {
      content: ""; position: absolute;
      top: -3px; left: -2px;
      width: 15px; height: 15px;
      border-radius: 50%; background: #1e2025;
    }
    .status-dot.dnd { background: var(--dnd); }
    .status-dot.dnd::after {
      content: ""; width: 58%; height: 18%;
      background: #1e2025; border-radius: 8px;
    }
    .status-dot.offline { background: var(--offline); }
    .status-dot.offline::after {
      content: ""; width: 40%; height: 40%;
      background: #1e2025; border-radius: 50%;
    }

    /* ── INFO ── */
    .card-info {
      display: flex; flex-direction: column;
      gap: 0.4rem;
    }

    .username {
      font-family: 'Space Mono', monospace;
      font-size: 1.25rem; font-weight: 700;
      letter-spacing: -0.02em; color: var(--text);
      line-height: 1;
    }

    .display-name {
      font-size: 0.82rem; color: var(--muted); font-weight: 300;
    }

    .custom-status {
      display: inline-flex; align-items: center; gap: 0.45rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.28rem 0.75rem;
      margin-top: 0.15rem;
      max-width: 100%;
    }
    .custom-status-emoji { font-size: 0.95rem; flex-shrink: 0; }
    .custom-status-text {
      font-size: 0.78rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 200px;
    }

    .status-badge { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.1rem; }
    .badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--offline); flex-shrink: 0; transition: background 0.5s;
    }
    .badge-dot.online  { background: var(--online); }
    .badge-dot.idle    { background: var(--idle); }
    .badge-dot.dnd     { background: var(--dnd); }
    .badge-dot.offline { background: var(--offline); }

    .badge-label {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--muted); transition: color 0.5s;
    }
    .badge-label.online  { color: var(--online); }
    .badge-label.idle    { color: var(--idle); }
    .badge-label.dnd     { color: var(--dnd); }
    .badge-label.offline { color: var(--offline); }

    /* ── TYPEWRITER ── */
    .typewriter-wrap {
      margin-top: 2.2rem;
      display: flex; align-items: center; justify-content: center;
      height: 1.8rem;
      opacity: 0;
      animation: slideIn 0.5s ease 1.7s forwards;
    }
    .typewriter-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem; color: var(--muted);
      letter-spacing: 0.04em;
    }
    .typewriter-cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--accent);
      margin-left: 3px; vertical-align: middle;
      border-radius: 1px;
      animation: blink 0.75s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      .main { padding-top: 14vh; }
      .card {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1.2rem;
        padding: 1.8rem 1.4rem;
      }
      .card-info { align-items: center; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <main class="main">

    <div class="card" id="profile-card">
      <!-- Avatar: avatar-outer contiene el ring+dot, avatar-wrap hace el clip circular -->
      <div class="avatar-outer" id="avatar-outer">
        <div class="avatar-wrap">
          <img id="avatar-img" src="" alt="Avatar" />
        </div>
        <div class="status-ring" id="status-ring"></div>
        <div class="status-dot"  id="status-dot"></div>
      </div>

      <div class="card-info">
        <h1  class="username"     id="username">—</h1>
        <p   class="display-name" id="display-name"></p>

        <div class="custom-status" id="custom-status-wrap">
          <span class="custom-status-emoji" id="custom-emoji"></span>
          <span class="custom-status-text"  id="custom-text">Sin estado</span>
        </div>

        <div class="status-badge">
          <span class="badge-dot"   id="badge-dot"></span>
          <span class="badge-label" id="badge-label">Cargando...</span>
        </div>
      </div>
    </div>

    <div class="typewriter-wrap">
      <span class="typewriter-text"   id="tw-text"></span><span class="typewriter-cursor"></span>
    </div>

  </main>

  <script src="bg.js"></script>
  <script src="discord.js"></script>
  <script src="typewriter.js"></script>
</body>
</html>
