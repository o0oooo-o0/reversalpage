<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F3 — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: rgba(14, 22, 45, 0.78);
      --border:  rgba(88, 101, 242, 0.18);
      --text:    #dce8ff;
      --muted:   #7a90b8;
      --accent:  #4f7fff;
      --online:  #3ba55c;
      --idle:    #faa61a;
      --dnd:     #ed4245;
      --offline: #747f8d;
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    #bg-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── LAYOUT ── */
    .main {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 18vh;
      width: 100%; height: 100vh;
    }

    /* ── CARD ── */
    .card {
      display: flex; flex-direction: row; align-items: center;
      gap: 1.8rem;
      width: min(480px, 92vw);
      padding: 1.8rem 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      box-shadow:
        0 0 0 1px rgba(79,127,255,0.08) inset,
        0 24px 64px rgba(0,0,0,0.6),
        0 0 40px rgba(58,120,255,0.08);
      opacity: 0;
      transform: translateY(-50px) scale(0.97);
      animation: slideIn 0.8s cubic-bezier(0.34,1.4,0.64,1) 1s forwards;
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── AVATAR ── */
    .avatar-outer {
      position: relative;
      width: 90px; height: 90px;
      flex: 0 0 90px;
      align-self: center;
    }

    /* El clip circular real: contenedor cuadrado + overflow hidden */
    .avatar-wrap {
      width: 90px; height: 90px;
      border-radius: 50%;
      overflow: hidden;
      position: relative; z-index: 1;
    }

    .avatar-wrap img {
      display: block;
      width: 90px; height: 90px;
      object-fit: cover; object-position: center;
    }

    .status-ring {
      position: absolute; inset: -4px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      transition: border-color 0.5s, box-shadow 0.5s;
    }
    .status-ring.online  { border-color: var(--online);  box-shadow: 0 0 14px rgba(59,165,92,0.4); }
    .status-ring.idle    { border-color: var(--idle);    box-shadow: 0 0 14px rgba(250,166,26,0.4); }
    .status-ring.dnd     { border-color: var(--dnd);     box-shadow: 0 0 14px rgba(237,66,69,0.4); }
    .status-ring.offline { border-color: var(--offline); box-shadow: none; }

    .status-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 22px; height: 22px; border-radius: 50%;
      border: 3.5px solid #0d1421;
      background: var(--offline);
      transition: background 0.5s;
      display: flex; justify-content: center; align-items: center;
    }
    .status-dot.online  { background: var(--online); }
    .status-dot.idle    { background: var(--idle); overflow: hidden; }
    .status-dot.idle::before {
      content: ""; position: absolute;
      top: -3px; left: -2px;
      width: 15px; height: 15px;
      border-radius: 50%; background: #0d1421;
    }
    .status-dot.dnd { background: var(--dnd); }
    .status-dot.dnd::after { content: ""; width: 58%; height: 18%; background: #0d1421; border-radius: 8px; }
    .status-dot.offline { background: var(--offline); }
    .status-dot.offline::after { content: ""; width: 40%; height: 40%; background: #0d1421; border-radius: 50%; }

    /* ── INFO ── */
    .card-info {
      display: flex; flex-direction: column; gap: 0.42rem;
      min-width: 0;
    }

    /* Username row con badge al lado */
    .username-row {
      display: flex; align-items: center; gap: 0.5rem;
    }

    /* ── ANIMATED BLUE GRADIENT TEXT ── */
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .username {
      font-family: 'Space Mono', monospace;
      font-size: 1.25rem; font-weight: 700;
      letter-spacing: -0.02em; line-height: 1;
      background: linear-gradient(120deg, #a8c8ff, #5888ff, #1a4fff, #6fa8ff, #a8c8ff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 4s ease infinite;
    }

    .display-name {
      font-size: 0.82rem; font-weight: 300;
      background: linear-gradient(120deg, #7aabff, #3a6ecc, #1040bb, #5a90ee, #7aabff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 5s ease infinite;
    }

    /* Badge imagen al lado del username */
    .username-badge {
      height: 26px;
      width: auto;
      max-width: 110px;
      object-fit: contain;
      object-position: center top;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(79,127,255,0.7));
      display: block;
    }

    .custom-status {
      display: inline-flex; align-items: center; gap: 0.45rem;
      background: rgba(58,100,255,0.08);
      border: 1px solid rgba(79,127,255,0.15);
      border-radius: 100px;
      padding: 0.28rem 0.75rem;
      margin-top: 0.1rem;
      max-width: 100%;
    }
    .custom-status-emoji { font-size: 0.95rem; flex-shrink: 0; }
    .custom-status-text  {
      font-size: 0.78rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
    }

    .status-badge { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.05rem; }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--offline); flex-shrink: 0; transition: background 0.5s; }
    .badge-dot.online  { background: var(--online); }
    .badge-dot.idle    { background: var(--idle); }
    .badge-dot.dnd     { background: var(--dnd); }
    .badge-dot.offline { background: var(--offline); }
    .badge-label {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--muted); transition: color 0.5s;
    }
    .badge-label.online  { color: var(--online); }
    .badge-label.idle    { color: var(--idle); }
    .badge-label.dnd     { color: var(--dnd); }
    .badge-label.offline { color: var(--offline); }

    /* ── TYPEWRITER ── */
    .typewriter-wrap {
      margin-top: 2rem;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      animation: slideIn 0.5s ease 1.7s forwards;
    }
    .typewriter-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.88rem; color: var(--muted); letter-spacing: 0.04em;
    }
    .typewriter-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--accent);
      margin-left: 3px; vertical-align: middle; border-radius: 1px;
      animation: blink 0.75s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── FOOTER ── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      display: flex; justify-content: center; align-items: center;
      padding: 1.1rem 1.5rem;
      /* Glass strip */
      background: linear-gradient(to top, rgba(8,14,30,0.85) 0%, rgba(8,14,30,0.0) 100%);
      /* Start off-screen, lerp in via JS */
      transform: translateY(60px);
      opacity: 0;
      pointer-events: none;
      transition: none; /* JS handles lerp */
    }

    .footer-text {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.68rem, 1.8vw, 0.82rem);
      color: rgba(122, 144, 184, 0.6);
      letter-spacing: 0.02em;
      text-align: center;
      pointer-events: auto;
    }

    .footer-text a {
      color: rgba(100, 160, 255, 0.75);
      text-decoration: none;
      transition: color 0.3s;
    }
    .footer-text a:hover { color: #7ab4ff; }

    /* ── MUSIC PLAYER ── */
    .music-player {
      position: fixed; top: 1.2rem; left: 1.2rem; z-index: 30;
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.6rem 1rem;
      background: rgba(14, 22, 45, 0.82);
      border: 1px solid rgba(79,127,255,0.18);
      border-radius: 100px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(-20px);
      transition: none; /* JS lerp */
    }

    .music-btn {
      background: none; border: none; cursor: pointer;
      color: #7ab4ff; padding: 0;
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      transition: color 0.2s, background 0.2s;
    }
    .music-btn:hover { color: #b8d8ff; background: rgba(79,127,255,0.12); }
    .music-btn svg { width: 16px; height: 16px; }

    .music-info {
      display: flex; flex-direction: column; gap: 1px;
      max-width: 130px;
    }
    .music-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem; color: #a8c8ff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .music-sub {
      font-size: 0.62rem; color: var(--muted);
    }

    .music-vol-wrap {
      display: flex; align-items: center; gap: 0.4rem;
    }
    .music-vol {
      -webkit-appearance: none;
      appearance: none;
      width: 60px; height: 3px;
      border-radius: 2px;
      background: rgba(79,127,255,0.25);
      outline: none; cursor: pointer;
    }
    .music-vol::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #5888ff;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(79,127,255,0.6);
    }

    /* ── RIPPLE CANVAS ── */
    #ripple-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
      mix-blend-mode: screen;
    }

    /* ── FOOTER ICONS ── */
    .footer-icon {
      display: inline-flex; align-items: center; justify-content: center;
      vertical-align: middle;
      width: 22px; height: 22px;
      margin: 0 0.3rem;
      opacity: 0.65;
      transition: opacity 0.2s, transform 0.2s;
    }
    .footer-icon:hover { opacity: 1; transform: scale(1.2); }
    .footer-icon svg { width: 18px; height: 18px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
      .main { padding-top: 12vh; }
      .card { flex-direction: column; align-items: center; text-align: center; gap: 1.2rem; padding: 1.8rem 1.4rem; }
      .card-info { align-items: center; }
      .username-row { justify-content: center; }
    }
  </style>
</head>

  <script>
  (function() {
    function lerp(a, b, t) { return a + (b - a) * t; }

    /* ── FOOTER LERP ── */
    const footer = document.getElementById('footer');
    let fY = 60, fO = 0, ftY = 0, ftO = 1;
    setTimeout(() => { ftY = 0; ftO = 1; }, 2200);
    (function tickFooter() {
      fY = lerp(fY, ftY, 0.055);
      fO = lerp(fO, ftO, 0.055);
      footer.style.transform = `translateY(${fY.toFixed(3)}px)`;
      footer.style.opacity = fO.toFixed(4);
      requestAnimationFrame(tickFooter);
    })();

    /* ── MUSIC PLAYER LERP ── */
    const player = document.getElementById('music-player');
    let pY = -20, pO = 0, ptY = 0, ptO = 1;
    setTimeout(() => { ptY = 0; ptO = 1; }, 1800);
    (function tickPlayer() {
      pY = lerp(pY, ptY, 0.06);
      pO = lerp(pO, ptO, 0.06);
      player.style.transform = `translateY(${pY.toFixed(3)}px)`;
      player.style.opacity = pO.toFixed(4);
      requestAnimationFrame(tickPlayer);
    })();

    /* ── MUSIC CONTROLS ── */
    const audio     = document.getElementById('audio');
    const playBtn   = document.getElementById('play-btn');
    const playIcon  = document.getElementById('play-icon');
    const volSlider = document.getElementById('vol-slider');

    const ICON_PLAY  = '<path d="M8 5v14l11-7z"/>';
    const ICON_PAUSE = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

    audio.volume = 0.4;
    audio.loop   = true;

    function syncIcon() {
      playIcon.innerHTML = audio.paused ? ICON_PLAY : ICON_PAUSE;
    }

    /* Autoplay: browsers require a user gesture first.
       We attempt silent autoplay immediately; if blocked,
       we play on the very first interaction anywhere on the page. */
    function tryAutoplay() {
      audio.play().then(() => {
        syncIcon();
      }).catch(() => {
        /* Blocked — wait for first click/touch anywhere */
        function onFirstInteraction() {
          audio.play().then(syncIcon);
          document.removeEventListener('click',     onFirstInteraction);
          document.removeEventListener('touchstart',onFirstInteraction);
          document.removeEventListener('keydown',   onFirstInteraction);
        }
        document.addEventListener('click',      onFirstInteraction, { once: true });
        document.addEventListener('touchstart', onFirstInteraction, { once: true });
        document.addEventListener('keydown',    onFirstInteraction, { once: true });
      });
    }

    /* Small delay so the audio element is fully ready */
    setTimeout(tryAutoplay, 500);

    playBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (audio.paused) { audio.play().then(syncIcon); }
      else              { audio.pause(); syncIcon(); }
    });

    volSlider.addEventListener('input', () => {
      audio.volume = volSlider.value / 100;
    });

    audio.addEventListener('play',  syncIcon);
    audio.addEventListener('pause', syncIcon);

    /* ── RIPPLE / 3D LIQUID SURFACE DISTURBANCE ── */
    const rc   = document.getElementById('ripple-canvas');
    const rctx = rc.getContext('2d');
    let RW, RH;

    function resizeRipple() { RW = rc.width = window.innerWidth; RH = rc.height = window.innerHeight; }
    resizeRipple();
    window.addEventListener('resize', resizeRipple);

    const ripples = [];

    function spawnRipple(x, y, strength) {
      const s = strength || 1;
      // Multiple rings per splash for realistic water
      const rings = 2 + Math.floor(Math.random() * 2);
      for (let i = 0; i < rings; i++) {
        ripples.push({
          x, y,
          r: i * 6,
          maxR: (55 + Math.random() * 45) * s,
          alpha: (0.22 + Math.random() * 0.12) * s,
          speed: (1.4 + Math.random() * 1.0) * (1 - i * 0.15),
          lineW: 1.5 - i * 0.3,
          // Specular highlight angle
          specAngle: Math.random() * Math.PI * 2,
        });
      }
    }

    let lastX = -1, lastY = -1;
    window.addEventListener('mousemove', e => {
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      const dist2 = dx*dx + dy*dy;
      if (dist2 > 300) {
        const strength = Math.min(1.5, Math.sqrt(dist2) / 30);
        spawnRipple(e.clientX, e.clientY, strength);
        lastX = e.clientX; lastY = e.clientY;
      }
    });
    window.addEventListener('touchmove', e => {
      spawnRipple(e.touches[0].clientX, e.touches[0].clientY, 1);
    }, { passive: true });

    (function tickRipple() {
      rctx.clearRect(0, 0, RW, RH);

      for (let i = ripples.length - 1; i >= 0; i--) {
        const rp = ripples[i];
        rp.r += rp.speed;
        const prog = rp.r / rp.maxR;
        if (prog >= 1) { ripples.splice(i, 1); continue; }

        // Ease out opacity
        const a = rp.alpha * (1 - prog * prog);

        // ── Main ring ──
        rctx.beginPath();
        rctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
        rctx.strokeStyle = `rgba(100,160,255,${(a * 0.6).toFixed(3)})`;
        rctx.lineWidth = rp.lineW * (1 + (1 - prog) * 1.5);
        rctx.stroke();

        // ── Specular highlight arc (bright spot on ring = 3D illusion) ──
        const arcLen = Math.PI * 0.25 * (1 - prog * 0.5);
        rctx.beginPath();
        rctx.arc(rp.x, rp.y, rp.r, rp.specAngle - arcLen, rp.specAngle + arcLen);
        const specA = a * 2.5;
        rctx.strokeStyle = `rgba(200,230,255,${Math.min(1, specA).toFixed(3)})`;
        rctx.lineWidth = rp.lineW * 2.2;
        rctx.stroke();

        // ── Inner glow fill (subsurface scatter illusion) ──
        if (prog < 0.5 && rp.r > 4) {
          const grad = rctx.createRadialGradient(rp.x, rp.y, rp.r * 0.6, rp.x, rp.y, rp.r);
          grad.addColorStop(0, `rgba(60,120,255,0)`);
          grad.addColorStop(1, `rgba(80,140,255,${(a * 0.08).toFixed(3)})`);
          rctx.beginPath();
          rctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
          rctx.fillStyle = grad;
          rctx.fill();
        }
      }
      requestAnimationFrame(tickRipple);
    })();
  })();
  </script>
</body>
