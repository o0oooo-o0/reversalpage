<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F3kel666</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Fondo parallax canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Contenido principal -->
  <main class="main">
    <div class="card" id="profile-card">

      <!-- Avatar + status ring -->
      <div class="avatar-wrap">
        <img id="avatar-img" src="" alt="Avatar" />
        <div class="status-ring" id="status-ring"></div>
        <div class="status-dot" id="status-dot"></div>
      </div>

      <!-- Info -->
      <div class="card-info">
        <h1 class="username" id="username">—</h1>
        <p class="display-name" id="display-name"></p>

        <!-- Custom status -->
        <div class="custom-status" id="custom-status-wrap">
          <span class="custom-status-emoji" id="custom-emoji"></span>
          <span class="custom-status-text" id="custom-text">No status set</span>
        </div>

        <!-- Badge de estado -->
        <div class="status-badge" id="status-badge">
          <span class="badge-dot" id="badge-dot"></span>
          <span class="badge-label" id="badge-label">Loading...</span>
        </div>
      </div>

    </div>
  </main>

  <script src="bg.js"></script>
  <script src="discord.js"></script>
</body>
</html>
